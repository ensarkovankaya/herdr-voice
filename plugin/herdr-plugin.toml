id = "herdr-voice"
name = "herdr-voice"
version = "2.0.0-rc.3"
min_herdr_version = "0.7.0"
description = "Speak Claude Code summaries on your active device (macOS say)."
platforms = ["macos"]

[[actions]]
id = "toggle"
title = "herdr-voice: toggle voice (global)"
command = ["bash", "actions/toggle.sh"]

[[actions]]
id = "toggle-pane"
title = "herdr-voice: toggle voice (this pane)"
command = ["bash", "actions/toggle.sh", "pane"]

[[actions]]
id = "enable"
title = "herdr-voice: voice on"
command = ["bash", "actions/toggle.sh", "on"]

[[actions]]
id = "disable"
title = "herdr-voice: voice off"
command = ["bash", "actions/toggle.sh", "off"]
